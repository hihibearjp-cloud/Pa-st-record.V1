    // --- 下午茶與打氣語錄資料庫 ---
    const treatsPool = [
      { icon: '☕🥐', name: '熱拿鐵與酥脆可頌', msg: '香醇咖啡搭配奶油香，撫平您今日的辛勞！' },
      { icon: '🧋🥞', name: '黑糖珍奶與熱鬆餅', msg: '甜甜的滋味，瞬間補充流失的腦力與體力！' },

    const cheerMessagesPool = [

    ];

    const ClassroomLogApp = () => {
      
      const [isAuthorized, setIsAuthorized] = useState(() => {
        try { return localStorage.getItem('louisaAppAuth') === 'true'; } catch(e){ return false; }
      });
      // 🌟 新增狀態：記錄是否為管理員(創作者)登入
      const [isMasterUser, setIsMasterUser] = useState(() => {
        try { return localStorage.getItem('louisaAppAuthIsMaster') === 'true'; } catch(e){ return false; }
      });

      const [passcodeInput, setPasscodeInput] = useState('');
      const [passcodeError, setPasscodeError] = useState(false);
      const [isChecking, setIsChecking] = useState(false); 

      const handleLogin = async (e) => {
        e.preventDefault();
        const inputStr = passcodeInput.trim();
        if (!inputStr) return;

        const loginSuccess = (isMaster = false) => {
          setIsAuthorized(true);
          setIsMasterUser(isMaster);
          localStorage.setItem('louisaAppAuth', 'true');
          localStorage.setItem('louisaAppAuthIsMaster', isMaster ? 'true' : 'false');
          setPasscodeError(false);
          setIsChecking(false);
          
          const joke = coldJokes[Math.floor(Math.random() * coldJokes.length)];
          setRandomJokeText(joke);
          setShowWelcomeJoke(true);
        };

        if (inputStr === window.MASTER_PASSWORD) {
           loginSuccess(true); // 創作者輸入 621025，登入為 Master 管理員
           return;
        }

        if (!window.SHEET_CSV_URL || window.SHEET_CSV_URL.includes('xxxxxxxxxxxxxxxxxxxx')) {
           setPasscodeError(true);
           setPasscodeInput('');
           return;
        }
        
        setIsChecking(true);
        setPasscodeError(false);

        try {
          const fetchUrl = window.SHEET_CSV_URL + (window.SHEET_CSV_URL.includes('?') ? '&' : '?') + 'nocache=' + new Date().getTime();
          const response = await fetch(fetchUrl);
          if (!response.ok) throw new Error('Network response was not ok');
          
          const text = await response.text();
          const validPasswords = text.split('\n')
            .map(row => row.split(',')[0].replace('\r', '').trim())
            .filter(pwd => pwd !== '');

          if (validPasswords.includes(inputStr)) {
            loginSuccess(false); // 其他使用者登入
          } else {
            setPasscodeError(true);
            setPasscodeInput('');
          }
        } catch (error) {
          console.error("Fetch password failed:", error);
          alert('無法連線到雲端密碼系統！\n請確定 Google 試算表網址設定正確，或檢查網路。');
          setPasscodeError(true);
        } finally {
          setIsChecking(false);
        }
      };

      const handleLogout = () => {
        if(confirm('確定要鎖定系統嗎？下次進入需要重新輸入通行碼。')) {
          setIsAuthorized(false);
          setIsMasterUser(false);
          localStorage.removeItem('louisaAppAuth');
          localStorage.removeItem('louisaAppAuthIsMaster');
          setPasscodeInput('');
        }
      };

      useEffect(() => {
        document.body.style.overscrollBehaviorY = 'none';
        return () => { document.body.style.overscrollBehaviorY = 'auto'; };
      }, []);

      const getWeekday = (dateString) => {
        const days = ['日', '一', '二', '三', '四', '五', '六'];
        return days[new Date(dateString).getDay()];
      };

      const defaultGradeOptions = ['一上', '一下', '二上', '二下', '三上', '三下'];
      const periodOptions = ['早修', '一', '二', '三', '四', '午餐', '午休', '五', '六', '七', '八'];
      const incidentCategoryOptions = ['1. 拒學/中輟', '2. 自傷/自殺', '3. 藥物濫用', '4. 性侵/性騷擾', '5. 家暴/兒虐', '6. 哀傷/失落', '7. 家庭/親子', '8. 情緒困擾', '9. 人際困擾', '10. 學習困擾', '11. 精神疾患', '12. 特教', '13. 偏差行為', '14. 性別/感情', '15. 生涯議題', '16. 其他'];

      const [studentCount, setStudentCount] = useState(() => {
        try { const saved = localStorage.getItem('louisaClassroomStudentCount'); return saved ? parseInt(saved, 10) : 35; } catch(e) { return 35; }
      });
      const seatOptions = Array.from({ length: studentCount }, (_, i) => String(i + 1));

      const [roster, setRoster] = useState(() => {
        try { const saved = localStorage.getItem('louisaClassroomRoster'); return saved ? JSON.parse(saved) : { '1': '周杰倫', '2': '王力宏', '5': '蔡依林', '10': '孫燕姿', '11': '陳奕迅', '12': '梁靜茹' }; } catch(e){ return {}; }

      const [logs, setLogs] = useState(() => {
        try { const saved = localStorage.getItem('louisaClassroomLogs'); return saved ? JSON.parse(saved) : []; } catch(e){ return []; }
      });

        try { const saved = localStorage.getItem('louisaNotifiedOptions'); return saved ? JSON.parse(saved) : defaultNotifiedOptions; } catch(e){ return defaultNotifiedOptions; }

        try { const saved = localStorage.getItem('louisaGradeOptions'); return saved ? JSON.parse(saved) : defaultGradeOptions; } catch(e){ return defaultGradeOptions; }
      });

            setSelectedTreat(finalTreat);

                                <button onClick={() => setEditingLog(log)} className="p-3 min-w-[48px] min-h-[48px] bg-[#FFF5BA] border-[2.5px] border-[#5C3A21] rounded-xl flex items-center justify-center shadow-[2px_2px_0_#5C3A21] active:shadow-none active:translate-y-px transition-all"><Edit2 size={18} /></button>
                                <button onClick={() => handleDelete(log.id)} className="p-3 min-w-[48px] min-h-[48px] bg-[#FFB7B2] border-[2.5px] border-[#5C3A21] rounded-xl flex items-center justify-center shadow-[2px_2px_0_#5C3A21] active:shadow-none active:translate-y-px transition-all"><Trash2 size={18} /></button>
                              </div>
                            </div>
                            
                            {(log.incidentCategories?.length > 0 || log.notifiedParties?.length > 0) && (
                              <div className="mb-4 flex flex-wrap gap-2.5">
                                {log.incidentCategories?.map(cat => <span key={cat} className="text-sm bg-[#FFB7B2]/30 text-[#C84B31] px-3 py-1.5 rounded-lg border-2 border-[#FFB7B2] font-bold">{cat}</span>)}
                                {log.notifiedParties?.map(party => <span key={party} className="text-sm bg-[#B5EAD7]/50 text-emerald-700 px-3 py-1.5 rounded-lg border-2 border-[#B5EAD7] font-bold">通知: {party}</span>)}
                              </div>
                            )}

                            <div className="whitespace-pre-wrap text-[#5C4535] leading-relaxed text-lg mb-5 font-medium">{log.content}</div>
                            <div className="text-right text-[15px] text-[#8C7A6B] font-bold">
                              紀錄者：<span className="signature-text text-black text-[22px] ml-1">{log.teacher}</span>
                            </div>
                          </>
                        )}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* 匯出分頁 */}
            {activeTab === 'export' && (
              <div className="space-y-6 animate-fade-in">
                <div className="bg-[#FFFBF5] border-[3px] border-[#5C3A21] rounded-2xl p-6 shadow-[6px_6px_0_#5C3A21]">
                  <h2 className="text-xl font-bold mb-5 flex items-center gap-2 text-[#5C3A21] border-b-2 border-[#D5C8BA] pb-3">
                    <FileText /> 匯出輔導紀錄表
                  </h2>
                  
                  <div className="p-4 bg-[#C7CEEA]/20 border-[2px] border-[#C7CEEA] rounded-xl mb-5">
                    <p className="text-[15px] text-[#5C4535] font-bold leading-relaxed">
                      ⚠️ <strong className="text-[#C84B31]">iPad 專屬升級</strong>：由於 iPad 版 Word 無法正常開啟網頁轉換的表格，請使用下方的「列印 / 存為 PDF」功能。<br/>
                      💡 <span className="text-gray-600">在彈出的列印畫面上，直接用兩根手指<b className="text-blue-600">向外撥開放大</b>，即可變成完美的 PDF 存檔或分享！系統會自動依據每位學生「獨立分頁」。</span>
                    </p>
                  </div>

                  <div className="border-[2.5px] border-[#D5C8BA] rounded-2xl p-4 sm:p-5 bg-white">
                    <div className="relative mb-4">
                      <div className="absolute left-4 top-3.5 text-gray-400 pointer-events-none">
                         <Filter size={20} />
                      </div>
                      <select 
                        value={wordFilterSeat} 
                        onChange={e => setWordFilterSeat(e.target.value)} 
                        className="w-full pl-11 pr-4 py-3 min-h-[48px] text-[16px] bg-gray-50 border-[2px] border-[#5C3A21] rounded-xl font-bold focus:outline-none focus:ring-2 focus:ring-[#C7CEEA] appearance-none cursor-pointer"
                      >
                        <option value="">-- 顯示全班紀錄 (若全選將自動每人一頁) --</option>
                        {seatOptions.filter(seat => roster[seat]).map(seat => (
                          <option key={seat} value={seat}>{seat}號 {roster[seat]}</option>
                        ))}
                      </select>
                      <div className="absolute right-4 top-4 text-[#5C3A21] pointer-events-none text-sm">▼</div>
                    </div>

                    <div className="flex justify-between items-center mb-3 pb-3 border-b-2 border-dashed border-gray-200">
                      <h4 className="font-black text-[16px] text-[#5C3A21]">請勾選要匯出的紀錄：</h4>
                      <div className="space-x-2">
                        <button onClick={() => {
                          const filteredIds = logs.filter(log => wordFilterSeat ? log.seatNumber?.split(', ').includes(wordFilterSeat) : true).map(l => l.id);
                          setSelectedForExport(filteredIds);
                        }} className="px-3 py-2 min-h-[40px] text-sm bg-blue-50 text-blue-600 font-bold rounded-lg border-2 border-blue-200 active:bg-blue-100 transition-colors">全選</button>
                        <button onClick={() => setSelectedForExport([])} className="px-3 py-2 min-h-[40px] text-sm bg-gray-50 text-gray-600 font-bold rounded-lg border-2 border-gray-200 active:bg-gray-100 transition-colors">全不選</button>
                      </div>
                    </div>

                    <div className="max-h-[40vh] overflow-y-auto space-y-2.5 pr-2 custom-scrollbar">
                      {logs.filter(log => wordFilterSeat ? log.seatNumber?.split(', ').includes(wordFilterSeat) : true).map(log => (
                        <label key={log.id} className="flex items-start gap-4 p-3 hover:bg-[#F4EDE4] rounded-xl cursor-pointer border-2 border-gray-100 hover:border-[#D5C8BA] transition-colors min-h-[56px]">
                          <input type="checkbox" checked={selectedForExport.includes(log.id)} onChange={(e) => {
                            if (e.target.checked) setSelectedForExport([...selectedForExport, log.id]);
                            else setSelectedForExport(selectedForExport.filter(id => id !== log.id));
                          }} className="mt-1 w-6 h-6 accent-[#5C3A21] rounded flex-shrink-0 cursor-pointer" />
                          <div className="flex-1 pt-0.5">
                            <div className="font-black text-[16px] text-[#5C3A21] mb-1">{log.date} - {log.seatNumber ? `${log.seatNumber}號 ${log.student}` : '全班'}</div>
                            <div className="text-[14px] text-[#8C7A6B] font-medium truncate w-48 sm:w-full">{log.content}</div>
                          </div>
                        </label>
                      ))}
                      {logs.filter(log => wordFilterSeat ? log.seatNumber?.split(', ').includes(wordFilterSeat) : true).length === 0 && (
                        <div className="text-center text-gray-400 p-6 font-bold">此條件下尚無紀錄可供匯出</div>
                      )}
                    </div>
                  </div>

                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-6">
                    <button onClick={handleExportWord} className="w-full py-4 min-h-[60px] bg-white border-[2.5px] border-[#5C3A21] text-[#5C3A21] rounded-xl font-black shadow-[4px_4px_0_#D5C8BA] active:translate-y-1 active:shadow-none flex justify-center items-center gap-2 text-lg transition-all hover:bg-gray-50">
                      <Download size={22}/> 下載 Word (電腦版)
                    </button>
                    <button onClick={handlePrintPDF} className="w-full py-4 min-h-[60px] bg-[#C7CEEA] border-[2.5px] border-[#5C3A21] text-[#5C3A21] rounded-xl font-black shadow-[4px_4px_0_#5C3A21] active:translate-y-1 active:shadow-none flex justify-center items-center gap-2 text-lg transition-all hover:bg-[#B3BCE3]">
                      <Printer size={22}/> 列印 / 存為 PDF (iPad)
                    </button>
                  </div>

                </div>
              </div>
            )}

            {/* 設定分頁 */}
            {activeTab === 'settings' && (
              <div className="space-y-6 animate-fade-in">
                
                {/* 🔒 鎖定系統設定 */}
                <div className="bg-[#FFFBF5] border-[3px] border-[#5C3A21] rounded-2xl p-6 shadow-[6px_6px_0_#5C3A21]">
                  <h2 className="text-xl font-bold mb-4 flex items-center gap-2 text-[#5C3A21] border-b-2 border-[#D5C8BA] pb-3">
                    <Lock /> 隱私與權限設定
                  </h2>
                  <p className="text-[15px] text-[#8C7A6B] mb-5 font-bold">若您要將裝置借給他人，可點擊下方按鈕將系統上鎖。</p>
                  <button onClick={handleLogout} className="w-full py-4 min-h-[56px] bg-[#FFDAC1] border-[2.5px] border-[#5C3A21] rounded-xl font-black shadow-[4px_4px_0_#5C3A21] active:translate-y-1 active:shadow-none flex justify-center items-center gap-2 transition-colors text-lg">
                    <Lock size={20} /> 鎖定系統 (需重新輸入密碼)
                  </button>
                </div>

                {/* 班級名單設定 */}
                <div className="bg-[#FFFBF5] border-[3px] border-[#5C3A21] rounded-2xl p-6 shadow-[6px_6px_0_#5C3A21]">
                  <h2 className="text-xl font-bold mb-4 flex items-center gap-2 text-[#5C3A21] border-b-2 border-[#D5C8BA] pb-3">
                    <Users /> 班級名單設定
                  </h2>
                  <div className="mb-5">
                    <label className="block font-bold text-base mb-2 text-[#5C4535]">班級總人數：</label>
                    <input type="number" min="1" max="60" value={studentCount} onChange={e => setStudentCount(parseInt(e.target.value) || 35)} className="w-full md:w-1/3 border-[2.5px] border-[#5C3A21] p-3 min-h-[56px] text-lg rounded-xl font-bold outline-none focus:border-[#FFB7B2]" />
                  </div>
                  
                  <div className="mb-6">
                    <label className="block font-bold text-base mb-2 text-[#5C4535]">批次匯入姓名 (一行一個名字，將自動覆蓋目前名單)：</label>
                    <textarea value={batchImportText} onChange={e => setBatchImportText(e.target.value)} placeholder="王大明&#10;陳小美&#10;林阿華..." className="w-full h-32 border-[2.5px] border-[#5C3A21] p-4 text-lg rounded-xl font-bold mb-3 outline-none focus:border-[#FFB7B2]"></textarea>
                    <button onClick={handleBatchImport} className="w-full py-3.5 min-h-[56px] text-lg bg-[#FFF5BA] border-[2.5px] border-[#5C3A21] rounded-xl font-bold shadow-[3px_3px_0_#5C3A21] active:translate-y-px active:shadow-none transition-all">批次匯入取代</button>
                  </div>

                  <label className="block font-bold text-base mb-2 text-[#5C4535]">個別編輯名單：</label>
                  <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-3 max-h-72 overflow-y-auto p-3 border-[2.5px] border-[#D5C8BA] rounded-xl bg-white">
                    {seatOptions.map(seat => (
                      <div key={seat} className="flex items-center gap-2">
                        <span className="w-8 text-right font-black text-gray-400 text-lg">{seat}.</span>
                        <input type="text" value={roster[seat] || ''} onChange={e => setRoster({...roster, [seat]: e.target.value})} className="flex-1 border-b-[2.5px] border-dashed border-gray-300 px-2 py-2 min-h-[48px] text-lg font-bold focus:border-[#5C3A21] focus:outline-none transition-colors" placeholder="姓名" />
                      </div>
                    ))}
                  </div>
                </div>

                {/* 常用語錄管理 */}
                <div className="bg-[#FFFBF5] border-[3px] border-[#5C3A21] rounded-2xl p-6 shadow-[6px_6px_0_#5C3A21]">
                  <h2 className="text-xl font-bold mb-5 flex items-center gap-2 text-[#5C3A21] border-b-2 border-[#D5C8BA] pb-3">
                    <MessageCircle /> 常用語錄管理
                  </h2>
                  <div className="mb-4 flex flex-col md:flex-row gap-3">
                     <div className="relative flex-1">
                       <select value={settingManageCategory} onChange={(e) => setSettingManageCategory(e.target.value)} className="w-full border-[2.5px] border-[#5C3A21] p-3 min-h-[56px] text-lg rounded-xl font-bold bg-white appearance-none cursor-pointer outline-none focus:ring-2 focus:ring-[#FFB7B2]">
                         {Object.keys(templates).map(cat => <option key={cat} value={cat}>{cat}</option>)}
                       </select>
                       <div className="absolute right-4 top-4 text-[#5C3A21] pointer-events-none">▼</div>
                     </div>
                     <button onClick={() => {
                        if(confirm(`確定要刪除「${settingManageCategory}」這個分類及其所有語錄嗎？`)){
                           const newT = {...templates}; delete newT[settingManageCategory];
                           setTemplates(newT);
                           setSettingManageCategory(Object.keys(newT)[0] || '');
                           setContactCategory(Object.keys(newT)[0] || '');
                        }
                     }} className="px-5 py-3 min-h-[56px] text-lg bg-[#FFB7B2] border-[2.5px] border-[#5C3A21] rounded-xl font-bold shadow-[3px_3px_0_#5C3A21] active:shadow-none active:translate-y-px whitespace-nowrap transition-all">刪除分類</button>
                  </div>
                  <div className="space-y-2 max-h-72 overflow-y-auto border-[2.5px] border-[#D5C8BA] p-3 rounded-xl bg-white">
                    {templates[settingManageCategory]?.map((t, idx) => (
                      <div key={idx} className="flex justify-between items-start gap-3 p-3 hover:bg-gray-50 border-b-2 border-dashed border-gray-200 last:border-0 transition-colors rounded-lg">
                         <span className="text-[16px] text-[#5C4535] font-medium whitespace-pre-wrap leading-relaxed pt-1">{t}</span>
                         <button onClick={() => {
                            const newT = {...templates}; newT[settingManageCategory].splice(idx, 1); setTemplates(newT);
                         }} className="text-red-400 hover:text-red-600 p-2 min-w-[48px] min-h-[48px] flex items-center justify-center bg-red-50 rounded-lg transition-colors"><Trash2 size={20}/></button>
                      </div>
                    ))}
                    {(!templates[settingManageCategory] || templates[settingManageCategory].length === 0) && <div className="text-center text-gray-400 p-6 font-bold">此分類尚無語錄</div>}
                  </div>
                </div>

                {/* 資料備份與還原 */}
                <div className="bg-[#FFFBF5] border-[3px] border-[#5C3A21] rounded-2xl p-6 shadow-[6px_6px_0_#5C3A21]">
                  <h2 className="text-xl font-bold mb-4 flex items-center gap-2 text-[#5C3A21] border-b-2 border-[#D5C8BA] pb-3">
                    <Database /> 資料備份與還原
                  </h2>
                  <p className="text-[15px] text-[#8C7A6B] mb-5 font-bold">因為資料存在瀏覽器內，強烈建議每週定期備份以免遺失！</p>
                  <div className="flex flex-col md:flex-row gap-4">
                    <button onClick={handleBackupJSON} className="flex-1 py-4 min-h-[56px] bg-[#B5EAD7] border-[2.5px] border-[#5C3A21] rounded-xl font-black shadow-[4px_4px_0_#5C3A21] active:translate-y-1 active:shadow-none flex justify-center items-center gap-2 text-lg transition-all">
                      <Download size={20} /> 下載備份檔 (JSON)
                    </button>
                    <button onClick={() => fileInputRef.current.click()} className="flex-1 py-4 min-h-[56px] bg-[#FFF5BA] border-[2.5px] border-[#5C3A21] rounded-xl font-black shadow-[4px_4px_0_#5C3A21] active:translate-y-1 active:shadow-none flex justify-center items-center gap-2 text-lg transition-all">
                      <Upload size={20} /> 還原資料 (上傳 JSON)
                    </button>
                    <input type="file" accept=".json" ref={fileInputRef} onChange={handleRestoreJSON} className="hidden" />
                  </div>
                  
                  <div className="mt-8 pt-5 border-t-[3px] border-dashed border-red-200">
                    <button onClick={handleClearAllData} className="w-full py-4 min-h-[56px] bg-red-50 text-red-600 border-[2.5px] border-red-300 rounded-xl font-black hover:bg-red-100 transition-colors flex justify-center items-center gap-2 text-lg">
                      <AlertTriangle size={20} /> 清除系統所有資料 (危險動作，請先備份)
                    </button>
                  </div>
                </div>

              </div>
            )}
          </main>

          {/* 系統底部：左下計數器，右下作者題字 */}
          <footer className="max-w-4xl mx-auto w-full px-4 pb-8 pt-4 flex justify-between items-end">
            
            {/* 左下區域：管理員專屬計數器 */}
            {isMasterUser && isAuthorized ? (
              <div className="inline-flex flex-col items-center justify-center p-2.5 bg-[#FFFBF5] border-[2px] border-[#D5C8BA] rounded-xl shadow-sm animate-fade-in">
                <span className="text-[10px] font-bold text-[#8C7A6B] mb-1.5 tracking-widest">累積使用人次</span>
                <img 
                  src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https://hihibearjp-cloud.github.io/past-consult_fun/&count_bg=%235C3A21&title_bg=%23FFB7B2&title=Visits&edge_flat=false" 
                  alt="系統使用人次" 
                  className="shadow-[2px_2px_0_#5C3A21] rounded-md transition-transform hover:scale-105 h-5"
                />
              </div>
            ) : (
              <div className="w-20"></div> // 一般使用者登入時維持左下角大白留空，版面乾淨
            )}

            {/* 右下區域：作者題字 */}
            <div className="text-[#8C7A6B] font-bold text-xs text-right leading-tight pb-1">
              Designed by <br />
              <span className="signature-text text-[1.1rem] text-[#5C3A21]">Fun Croissant🎡04/2026</span>
            </div>

          </footer>

          {/* 學生選擇 Modal */}
          {showStudentModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4">
              <div className="bg-[#FFFBF5] border-[4px] border-[#5C3A21] w-full max-w-lg rounded-3xl flex flex-col max-h-[85vh] shadow-[8px_8px_0_#5C3A21] animate-fade-in">
                <div className="p-4 border-b-[3px] border-[#D5C8BA] flex justify-between items-center bg-[#F4EDE4] rounded-t-[28px]">
                  <h3 className="font-black text-xl text-[#5C3A21] pl-2">請點選學生 (可複選)</h3>
                  <button onClick={() => setShowStudentModal(false)} className="w-12 h-12 flex items-center justify-center bg-white border-[2.5px] border-[#5C3A21] rounded-xl hover:bg-[#FFB7B2] active:translate-y-px transition-colors shadow-sm text-[#5C3A21]"><X size={24} strokeWidth={3}/></button>
                </div>
                
                <div className="p-4 overflow-y-auto grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-3 custom-scrollbar">
                  <button type="button" onClick={() => {
                    const allSeats = seatOptions.filter(s => roster[s]);
                    if (tempSelectedSeats.length === allSeats.length) setTempSelectedSeats([]);
                    else setTempSelectedSeats(allSeats);
                  }} className="col-span-full mb-2 py-4 min-h-[60px] bg-gray-100 border-[2.5px] border-gray-300 rounded-xl font-black text-lg text-gray-600 hover:bg-gray-200 active:bg-gray-300 transition-colors">
                    {tempSelectedSeats.length > 0 && tempSelectedSeats.length === seatOptions.filter(s=>roster[s]).length ? '取消全選' : '全選有名字的學生'}
                  </button>
                  
                  {seatOptions.map(seat => {
                    const isSelected = tempSelectedSeats.includes(seat);
                    const hasName = Boolean(roster[seat]);
                    return (
                      <button 
                        type="button"
                        key={seat} 
                        onClick={() => toggleSeatSelection(seat)}
                        className={`aspect-square rounded-2xl border-[2.5px] flex flex-col items-center justify-center p-2 min-h-[85px] transition-all shadow-sm ${
                          isSelected ? 'bg-[#FFB7B2] border-[#5C3A21] shadow-[3px_3px_0_#5C3A21] -translate-y-1 text-[#5C3A21]' : 
                          hasName ? 'bg-white border-[#D5C8BA] hover:border-[#5C3A21] text-[#5C4535]' : 'bg-gray-50 border-gray-200 text-gray-300'
                        }`}
                      >
                        <span className="text-sm font-black mb-0.5 opacity-80">{seat}</span>
                        <span className="text-[17px] font-black truncate w-full text-center tracking-wide">{roster[seat] || '-'}</span>
                      </button>
                    );
                  })}
                </div>
                
                <div className="p-4 border-t-[3px] border-[#D5C8BA] bg-[#F4EDE4] rounded-b-[28px]">
                  <button type="button" onClick={confirmStudentSelection} className="w-full py-4 min-h-[60px] bg-[#5C3A21] text-[#FFFBF5] rounded-xl font-black text-xl tracking-widest shadow-[4px_4px_0_#3E2C20] active:shadow-none active:translate-y-1 active:translate-x-1 transition-all">
                    確定選取 ({tempSelectedSeats.length}人)
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<ClassroomLogApp />);
  </script>
</body>
</html>
